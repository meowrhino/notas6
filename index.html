<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>notas6 · archivo</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="bar">
      <h1>notas6</h1>
      <span class="sub" id="sub">expediente</span>
      <button class="atmos" id="atmos" title="atmósfera selva on/off" aria-label="atmósfera selva on/off" aria-pressed="false"><span aria-hidden="true">🌿</span></button>
      <label class="slip">
        <span aria-hidden="true">⌕</span>
        <input type="text" id="buscar" placeholder="rastrear en el expediente…" autocomplete="off" aria-label="buscar en el expediente">
        <span class="res" id="res" role="status" aria-live="polite" aria-atomic="true"></span>
      </label>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="body">
      <div class="rio" id="rio"></div>
      <div class="idx" id="idx"></div>
    </div>
  </div>

  <!-- capas de atmósfera selvática (fijas, sobre el río, bajo el lector) -->
  <div class="clima" aria-hidden="true"></div>
  <div class="vig" aria-hidden="true"></div>

  <!-- lector: hoja mecanografiada a página entera -->
  <div class="lector hidden" id="lector" role="dialog" aria-modal="true" tabindex="-1">
    <div class="lector-bar">
      <div class="cats" id="lector-cats"></div>
      <div class="stamp" id="lector-stamp"></div>
      <div class="lector-nav">
        <button class="lbtn" id="lector-prev" title="anterior · más nueva (←)" aria-label="anterior, pieza más nueva"><span aria-hidden="true">‹</span></button>
        <button class="lbtn" id="lector-next" title="siguiente · más antigua (→)" aria-label="siguiente, pieza más antigua"><span aria-hidden="true">›</span></button>
        <button class="lbtn" id="lector-copy" title="copiar enlace a esta pieza">copiar <span aria-hidden="true">⧉</span></button>
        <button class="cerrar" id="cerrar">cerrar <span aria-hidden="true">✕</span></button>
      </div>
    </div>
    <div class="hoja-wrap" id="hoja-wrap">
      <div class="hoja" id="hoja"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
